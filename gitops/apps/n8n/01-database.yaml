apiVersion: "acid.zalan.do/v1"
kind: postgresql
metadata:
  name: n8n-database
  namespace: n8n
spec:
  teamId: "n8n"

  volume:
    size: 5Gi

  numberOfInstances: 1

  users:
    n8n: []

  databases:
    n8n: n8n

  postgresql:
    version: "15"

  resources:
    requests:
      cpu: "50m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

  patroni:
    initdb:
      encoding: "UTF8"
      locale: "en_US.UTF-8"
    pg_hba:
      - local all all trust
      - host all all 0.0.0.0/0 md5
