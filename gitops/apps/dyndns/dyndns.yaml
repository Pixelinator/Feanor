apiVersion: v1
kind: Namespace
metadata:
  name: dyndns
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  creationTimestamp: null
  name: porkbun-api-credentials
  namespace: dyndns
spec:
  encryptedData:
    api-key: 
    secret-key: 
  template:
    metadata:
      creationTimestamp: null
      name: porkbun-api-credentials
      namespace: dyndns
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: dyndns-script
  namespace: dyndns
data:
  update.sh: |
    #!/bin/sh
    set -e

    DOMAIN="eldamar.dev"
    API_KEY="${PORKBUN_API_KEY}"
    SECRET_KEY="${PORKBUN_SECRET_KEY}"

    # Get current public IP
    CURRENT_IP=$(curl -sf https://api.ipify.org)
    if [ -z "$CURRENT_IP" ]; then
      echo "ERROR: Could not determine public IP"
      exit 1
    fi

    echo "Current public IP: $CURRENT_IP"

    # Get current DNS records from Porkbun
    RESPONSE=$(curl -sf -X POST "https://api.porkbun.com/api/json/v3/dns/retrieveByNameType/${DOMAIN}/A/*" \
      -H "Content-Type: application/json" \
      -d "{\"apikey\": \"${API_KEY}\", \"secretapikey\": \"${SECRET_KEY}\"}")

    DNS_IP=$(echo "$RESPONSE" | grep -o '"content":"[^"]*"' | head -1 | cut -d'"' -f4)
    echo "Current DNS IP: $DNS_IP"

    if [ "$CURRENT_IP" = "$DNS_IP" ]; then
      echo "IP unchanged, nothing to do"
      exit 0
    fi

    echo "IP changed! Updating DNS records..."

    # Get record ID for wildcard
    RECORD_ID=$(echo "$RESPONSE" | grep -o '"id":"[^"]*"' | head -1 | cut -d'"' -f4)

    # Update wildcard record
    curl -sf -X POST "https://api.porkbun.com/api/json/v3/dns/editByNameType/${DOMAIN}/A/*" \
      -H "Content-Type: application/json" \
      -d "{\"apikey\": \"${API_KEY}\", \"secretapikey\": \"${SECRET_KEY}\", \"content\": \"${CURRENT_IP}\", \"ttl\": \"600\"}"

    # Update root record
    curl -sf -X POST "https://api.porkbun.com/api/json/v3/dns/editByNameType/${DOMAIN}/A/" \
      -H "Content-Type: application/json" \
      -d "{\"apikey\": \"${API_KEY}\", \"secretapikey\": \"${SECRET_KEY}\", \"content\": \"${CURRENT_IP}\", \"ttl\": \"600\"}"

    echo "DNS updated successfully: $DNS_IP -> $CURRENT_IP"
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: dyndns
  namespace: dyndns
spec:
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: dyndns
              image: curlimages/curl:latest
              command: ["/bin/sh", "/scripts/update.sh"]
              env:
                - name: PORKBUN_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: porkbun-api-credentials
                      key: api-key
                - name: PORKBUN_SECRET_KEY
                  valueFrom:
                    secretKeyRef:
                      name: porkbun-api-credentials
                      key: secret-key
              volumeMounts:
                - name: script
                  mountPath: /scripts
          volumes:
            - name: script
              configMap:
                name: dyndns-script
                defaultMode: 0755
