apiVersion: v1
kind: ConfigMap
metadata:
  name: authentik-blueprints-forgejo
  namespace: authentik
data:
  forgejo.yaml: |
    version: 1
    metadata:
      name: homelab-forgejo
    entries:
      - model: authentik_providers_oauth2.oauth2provider
        state: present
        identifiers:
          name: Provider for forgejo
        attrs:
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
          client_type: confidential
          client_id: forgejo
          client_secret: t6vfyTnCwkpiKHXPXWk7y6B4ihcxC49WjHD3ggSmp5hl3pGPx9dylkrcZgGvOku8FBvgVXu0vmubLljsRgpe9jaKUdUakr2gYxmVD2KLZVjHOaxNeYsh6VBZWVs7UnmW
          signing_key: !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
          access_token_validity: hours=1
          refresh_token_validity: days=30
          property_mappings:
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-openid]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-email]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-profile]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-offline_access]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-entitlements]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/ak-api]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/proxy/scope-proxy]]

      - model: authentik_core.application
        state: present
        identifiers:
          slug: forgejo
        attrs:
          name: forgejo
          group: dev
          provider: !Find [authentik_providers_oauth2.oauth2provider, [name, Provider for forgejo]]
          policy_engine_mode: any
