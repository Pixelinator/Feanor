apiVersion: v1
kind: ConfigMap
metadata:
  name: authentik-blueprints-opencloud
  namespace: authentik
data:
  opencloud.yaml: |
    version: 1
    metadata:
      name: homelab-opencloud
    entries:
      - model: authentik_providers_oauth2.oauth2provider
        state: present
        identifiers:
          name: opencloud
        attrs:
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
          client_type: public
          client_id: opencloud
          client_secret: RSn48COYxY5aHILIbIRC7BXgCtW370Cq6hs83RRrzcuyMVCJSh3JgkuAFCo2eW47Jm0dfqQyz9zHeiHo4pu3jcY8J8qymfHW1ltcqkG52HT7lO9qi5I6hssJtolFV2tB
          redirect_uris: "https://cloud.eldamar.dev/web-oidc-callback\nhttps://cloud.eldamar.dev/oidc-silent-redirect.html\nhttps://cloud.eldamar.dev/oidc-callback.html"
          signing_key: !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
          access_token_validity: hours=1
          refresh_token_validity: days=30
          property_mappings:
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-openid]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-email]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-profile]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-offline_access]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-entitlements]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/ak-api]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/proxy/scope-proxy]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, homelab.property-mapping.opencloud-groups]]

      - model: authentik_core.application
        state: present
        identifiers:
          slug: opencloud
        attrs:
          name: Opencloud
          provider: !Find [authentik_providers_oauth2.oauth2provider, [name, opencloud]]
          policy_engine_mode: any
