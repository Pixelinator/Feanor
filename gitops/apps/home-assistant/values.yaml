replicaCount: 1

image:
  repository: homeassistant/home-assistant
  tag: "2026.7.2"  # current stable as of 2026-07-16; update deliberately via PR
  pullPolicy: IfNotPresent

gitSync:
  # URL of the ha-config repo on Forgejo
  repository: https://forgejo.eldamar.dev/akadmin/ha-config
  image:
    repository: registry.k8s.io/git-sync/git-sync
    tag: v4.4.2
  period: 60s

service:
  type: ClusterIP
  port: 8123

persistence:
  enabled: true
  storageClass: "local-path"
  size: 5Gi

extraVolumes: []        # optional: USB devices, config, etc.
extraVolumeMounts: []   # mount points for extraVolumes

# Path to configuration.yaml (can be mounted from ConfigMap)
configMapName: home-assistant-config

# Ingress configuration
ingress:
  enabled: true
  ingressClassName: "traefik"
  hosts:
    - home-assistant.eldamar.dev
  tls:
    - secretName: home-assistant-tls
      hosts:
        - home-assistant.eldamar.dev
  certManager: true   # use cert-manager ClusterIssuer