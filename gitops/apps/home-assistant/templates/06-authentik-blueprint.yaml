apiVersion: v1
kind: ConfigMap
metadata:
  name: authentik-blueprints-home-assistant
  namespace: authentik
data:
  # NOTE: provider/application only. The embedded-outpost assignment lives
  # centrally in authentik-blueprints-base (90-outposts.yaml) because
  # blueprints SET the outpost provider list -- per-app entries would
  # overwrite each other.
  home-assistant.yaml: |
    version: 1
    metadata:
      name: homelab-home-assistant
    entries:
      - model: authentik_providers_proxy.proxyprovider
        state: present
        identifiers:
          name: Provider for home-assistant
        attrs:
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
          mode: forward_single
          external_host: https://home-assistant.eldamar.dev
          # Companion app, HA's own token endpoints, and static assets must
          # bypass authentik -- they authenticate against HA directly.
          skip_path_regex: |-
            ^/api/.*
            ^/auth/.*
            ^/local/.*
            ^/static/.*
            ^/service_worker.js
            ^/manifest.json

      - model: authentik_core.application
        state: present
        identifiers:
          slug: home-assistant
        attrs:
          name: home-assistant
          group: home
          provider: !Find [authentik_providers_proxy.proxyprovider, [name, Provider for home-assistant]]
          policy_engine_mode: any
