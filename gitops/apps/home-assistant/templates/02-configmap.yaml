apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.configMapName }}
data:
  configuration.yaml: |
    homeassistant:
      time_zone: "Europe/Berlin"
      unit_system: metric
    # add additional Home Assistant configuration here
    http:
        use_x_forwarded_for: true
        trusted_proxies:
          - 10.42.0.0/16
          - 127.0.0.1
          - ::1



