apiVersion: apps/v1
kind: Deployment
metadata:
  name: home-assistant
spec:
  replicas: {{ .Values.replicaCount }}
  # RWO PVC + SQLite recorder: never run two HA pods against the same /config
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: home-assistant
  template:
    metadata:
      labels:
        app: home-assistant
    spec:
      initContainers:
        # One-time clone so /config/git/current exists before HA parses
        # configuration.yaml (its includes point into the checkout).
        - name: git-sync-init
          image: "{{ .Values.gitSync.image.repository }}:{{ .Values.gitSync.image.tag }}"
          args:
            - --repo={{ .Values.gitSync.repository }}
            - --depth=1
            - --one-time
            - --root=/config/git
            - --link=current
          env:
            - name: GITSYNC_USERNAME
              valueFrom:
                secretKeyRef:
                  name: ha-git-credentials
                  key: username
            - name: GITSYNC_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ha-git-credentials
                  key: token
          volumeMounts:
            - name: config
              mountPath: /config
        # custom_components (hass-auth-header) and www (/local assets) live in
        # the ha-config repo. custom_components can be a symlink into the
        # checkout (Python imports once at startup). www must be a REAL copy:
        # HA's static handler resolves symlinks once at startup, and git-sync
        # rotates worktrees on every commit -- a symlinked www 404s as soon as
        # the pinned worktree is cleaned up. Consequence: new/changed files in
        # www/ need a pod restart to be served.
        - name: link-git-dirs
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          command:
            - /bin/bash
            - -c
            - >-
              { [ -e /config/custom_components ] && [ ! -L /config/custom_components ]; }
              || ln -sfn /config/git/current/custom_components /config/custom_components;
              [ -L /config/www ] && rm /config/www;
              mkdir -p /config/www;
              cp -a /config/git/current/www/. /config/www/
          volumeMounts:
            - name: config
              mountPath: /config
      containers:
        - name: home-assistant
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            # HA imports custom_components from the git-sync checkout; without
            # this Python drops root-owned __pycache__ into the worktrees,
            # which git-sync (uid 65533) cannot delete -- cleanup jams and the
            # sync loop stalls.
            - name: PYTHONDONTWRITEBYTECODE
              value: "1"
          ports:
            - containerPort: {{ .Values.service.port }}
          volumeMounts:
            - name: config
              mountPath: /config
            - name: configmap
              mountPath: /config/configuration.yaml
              subPath: configuration.yaml
            {{- range .Values.extraVolumeMounts }}
            - name: {{ .name }}
              mountPath: {{ .mountPath }}
            {{- end }}
        - name: git-sync
          image: "{{ .Values.gitSync.image.repository }}:{{ .Values.gitSync.image.tag }}"
          args:
            - --repo={{ .Values.gitSync.repository }}
            - --depth=1
            - --period={{ .Values.gitSync.period }}
            - --root=/config/git
            - --link=current
            # On every new commit, POST the HA webhook; an automation in
            # ha-config runs homeassistant.reload_all. No token needed —
            # the webhook is local_only and pod-internal.
            - --webhook-url=http://localhost:8123/api/webhook/git-sync-reload
            - --webhook-method=POST
          env:
            - name: GITSYNC_USERNAME
              valueFrom:
                secretKeyRef:
                  name: ha-git-credentials
                  key: username
            - name: GITSYNC_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ha-git-credentials
                  key: token
          volumeMounts:
            - name: config
              mountPath: /config
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: home-assistant-config
        - name: configmap
          configMap:
            name: {{ .Values.configMapName }}
        {{- range .Values.extraVolumes }}
        - name: {{ .name }}
          {{- if .hostPath }}
          hostPath:
            path: {{ .hostPath }}
          {{- end }}
        {{- end }}
