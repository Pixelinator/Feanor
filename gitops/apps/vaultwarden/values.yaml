vaultwarden:
  env:
    TZ: Europe/Berlin
    DOMAIN: https://vaultwarden.eldamar.dev
    SIGNUPS_ALLOWED: "true"
    # To enable the admin panel, create a SealedSecret named 'vaultwarden-admin'
    # in the vaultwarden namespace with key 'ADMIN_TOKEN' set to a bcrypt hash:
    #
    #   echo -n "YOUR_PASSWORD" | htpasswd -iBnBC 10 "" | tr -d ':\n'
    #
    # Then create and seal the secret:
    #   kubectl create secret generic vaultwarden-admin \
    #     --namespace vaultwarden \
    #     --from-literal=ADMIN_TOKEN='$2y$10$...' \
    #     --dry-run=client -o yaml | kubeseal --format yaml \
    #     > gitops/apps/vaultwarden/templates/01-admin-sealed-secret.yaml
    #
    # Then uncomment below:
    # ADMIN_TOKEN:
    #   valueFrom:
    #     secretKeyRef:
    #       name: vaultwarden-admin
    #       key: ADMIN_TOKEN

  ingress:
    main:
      enabled: true
      ingressClassName: "traefik"
      annotations:
        cert-manager.io/cluster-issuer: "letsencrypt-production"
      hosts:
        - host: vaultwarden.eldamar.dev
          paths:
            - path: /
              pathType: Prefix
      tls:
        - secretName: vaultwarden-tls
          hosts:
            - vaultwarden.eldamar.dev

  persistence:
    data:
      enabled: true
      retain: true
      accessMode: ReadWriteOnce
      size: 10Gi
