vaultwarden:
  env:
    TZ: Europe/Berlin
    DOMAIN: https://vaultwarden.eldamar.dev
    SIGNUPS_ALLOWED: "false"
    # To enable the admin panel:
    # 1. Generate a hash:
    #      kubectl exec -n vaultwarden deploy/vaultwarden -- /vaultwarden hash --preset owasp
    # 2. Seal the secret:
    #      kubectl create secret generic vaultwarden-admin \
    #        --namespace vaultwarden \
    #        --from-literal=ADMIN_TOKEN='<paste-hash>' \
    #        --dry-run=client -o yaml | kubeseal --format yaml \
    #        > gitops/apps/vaultwarden/templates/01-admin-sealed-secret.yaml
    # 3. Uncomment below and commit both files.
    # ADMIN_TOKEN:
    #   valueFrom:
    #     secretKeyRef:
    #       name: vaultwarden-admin
    #       key: ADMIN_TOKEN

  ingress:
    main:
      enabled: true
      ingressClassName: "traefik"
      annotations:
        cert-manager.io/cluster-issuer: "letsencrypt-production"
      hosts:
        - host: vaultwarden.eldamar.dev
          paths:
            - path: /
              pathType: Prefix
      tls:
        - secretName: vaultwarden-tls
          hosts:
            - vaultwarden.eldamar.dev

  persistence:
    data:
      enabled: true
      retain: true
      accessMode: ReadWriteOnce
      size: 10Gi
